<!DOCTYPE html>
<html lang="ja">
  <head>
    <!-- 依存メモ: Google FontsとFigma capture.jsを利用し、DOMのみでホーム画面を表現する。 -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garake Home - Editable Capture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ebe8ef;
        --shell: #ebebf0;
        --shell-shadow: #a8a8b0;
        --shell-line: #babac2;
        --display-frame: #131018;
        --display-inner: #08050a;
        --lcd: #0e0810;
        --pink: #ffb3c6;
        --pink-deep: #7a3f5b;
        --pink-soft: #a9708a;
        --key: #f4f5f8;
        --key-line: #8f92a1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 12% 20%, #ffffffaa 0 12%, transparent 13%),
          radial-gradient(circle at 88% 84%, #ffffff88 0 8%, transparent 9%),
          linear-gradient(180deg, #f4f1f8, var(--bg));
        font-family: "M PLUS Rounded 1c", sans-serif;
      }

      .phone {
        width: min(420px, 92vw);
        aspect-ratio: 9 / 18.5;
        border-radius: 36px;
        background: linear-gradient(180deg, #f7f7fc, #d8d9e2);
        border: 2px solid var(--shell-line);
        box-shadow:
          0 32px 48px #00000022,
          inset 0 1px 0 #ffffffcc,
          inset 0 -10px 18px #b2b4c144;
        padding: 20px;
        display: grid;
        grid-template-rows: 58% 42%;
        gap: 14px;
      }

      .display-shell {
        border-radius: 26px 26px 18px 18px;
        background: linear-gradient(180deg, #2a1821, #170d14);
        box-shadow: inset 0 -12px 20px #00000066;
        padding: 18px 16px 14px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
      }

      .speaker {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .speaker-slot {
        width: 72px;
        height: 8px;
        border-radius: 99px;
        background: linear-gradient(180deg, #0e0a0d, #21131d);
        border: 1px solid #523346;
      }

      .display-frame {
        border-radius: 16px;
        background: linear-gradient(145deg, #3a1b2c, #1a0f17);
        border: 2px solid #5a2840;
        padding: 8px;
      }

      .display-inner {
        height: 100%;
        border-radius: 12px;
        border: 1px solid #6d3653;
        background: var(--display-inner);
        padding: 8px;
      }

      .lcd {
        height: 100%;
        border-radius: 10px;
        border: 1px solid #311524;
        background:
          linear-gradient(180deg, #130913, #09040d 55%, #100715),
          radial-gradient(circle at 90% 10%, #ffb3c622 0 20%, transparent 21%);
        box-shadow: inset 0 0 24px #00000066;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .status {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 8px;
        border-bottom: 1px solid #2a1424;
        color: #c8b5c1;
        font-size: 11px;
      }

      .status-bars {
        letter-spacing: 1px;
        font-family: "DotGothic16", monospace;
      }

      .home {
        padding: 10px 12px 12px;
        color: var(--pink-soft);
        display: grid;
        grid-template-rows: auto auto auto auto 1fr;
        gap: 6px;
      }

      .carrier {
        text-align: center;
        font-size: 12px;
        letter-spacing: 1px;
        color: #7a4a61;
      }

      .clock {
        text-align: center;
        color: var(--pink);
        font-family: "DotGothic16", monospace;
        font-size: clamp(34px, 7.2vw, 44px);
        line-height: 1;
        letter-spacing: 2px;
      }

      .date {
        text-align: center;
        font-size: 12px;
      }

      .home hr {
        margin: 2px 8px 0;
        border: none;
        height: 1px;
        background: #3a1a28;
      }

      .app-row {
        display: flex;
        justify-content: center;
        gap: 24px;
        padding-top: 10px;
      }

      .app {
        width: 84px;
        text-align: center;
      }

      .app-icon {
        width: 56px;
        height: 56px;
        margin: 0 auto;
        border-radius: 14px;
        display: grid;
        place-items: center;
        color: #ffdce6;
        background: linear-gradient(145deg, #4a1830, #2a0a18);
        border: 1.5px solid #8d5270;
        box-shadow: 0 0 10px #ff8fab33;
        font-size: 26px;
      }

      .app-label {
        margin-top: 8px;
        font-size: 10px;
        line-height: 1.25;
      }

      .keypad {
        border-radius: 18px 18px 30px 30px;
        background: linear-gradient(180deg, #f9f9fd, #d7d8e1);
        border: 1px solid #c3c4cd;
        box-shadow: inset 0 1px 0 #ffffff;
        padding: 16px 14px 18px;
        display: grid;
        grid-template-rows: 1fr auto;
      }

      .dpad-row {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 10px;
      }

      .mini-key {
        border-radius: 10px;
        border: 2px solid var(--key-line);
        background: linear-gradient(180deg, #ffffff, #dcdfe7);
        color: #5a6177;
        font-size: 26px;
        height: 46px;
      }

      .dpad {
        width: 152px;
        height: 98px;
        border-radius: 18px;
        border: 2px solid var(--key-line);
        background: linear-gradient(180deg, #f9fafe, #dadce5);
        position: relative;
        display: grid;
        place-items: center;
      }

      .ok {
        width: 82px;
        height: 48px;
        border-radius: 12px;
        border: 2px solid var(--key-line);
        background: linear-gradient(180deg, #ffffff, #e3e5ec);
        color: #2d3143;
        font-size: 38px;
        line-height: 40px;
        font-family: "DotGothic16", monospace;
      }

      .arrow {
        position: absolute;
        color: #8e93a3;
        font-size: 20px;
      }

      .up { top: 4px; }
      .down { bottom: 2px; }
      .left { left: 8px; }
      .right { right: 8px; }

      .cta-row {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .cta {
        height: 40px;
        border-radius: 10px;
        border: 2px solid var(--key-line);
        background: linear-gradient(180deg, #ffffff, #dde0e8);
        font-size: 15px;
        color: #222534;
        font-weight: 700;
      }

      @media (max-width: 480px) {
        .phone {
          border-radius: 28px;
          padding: 14px;
          gap: 10px;
        }

        .dpad {
          width: 138px;
          height: 90px;
        }

        .ok {
          width: 74px;
          height: 44px;
          font-size: 34px;
        }

        .cta {
          font-size: 14px;
        }
      }
    </style>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </head>
  <body>
    <!-- 提供メモ: Figmaで直接編集できるよう、ホームUIの要素をDOMで提供する。 -->
    <main class="phone">
      <section class="display-shell">
        <div class="speaker">
          <div class="speaker-slot"></div>
        </div>
        <div class="display-frame">
          <div class="display-inner">
            <div class="lcd">
              <div class="status">
                <span class="status-bars">1.|||</span>
                <span>▰</span>
              </div>
              <section class="home">
                <div class="carrier">✿ garake ✿</div>
                <div id="clock" class="clock">00:00</div>
                <div id="date" class="date">0000/00/00 (月)</div>
                <hr />
                <div class="app-row">
                  <article class="app">
                    <div class="app-icon">📷</div>
                    <div class="app-label">カメラ</div>
                  </article>
                  <article class="app">
                    <div class="app-icon">🖼</div>
                    <div class="app-label">写真を編集</div>
                  </article>
                </div>
              </section>
            </div>
          </div>
        </div>
      </section>

      <section class="keypad">
        <div class="dpad-row">
          <button class="mini-key" type="button">−</button>
          <div class="dpad">
            <span class="arrow up">▲</span>
            <span class="arrow left">◀</span>
            <button class="ok" type="button">OK</button>
            <span class="arrow right">▶</span>
            <span class="arrow down">▼</span>
          </div>
          <button class="mini-key" type="button">−</button>
        </div>
        <div class="cta-row">
          <button class="cta" type="button">メニュー</button>
          <button class="cta" type="button">スタンプ</button>
          <button class="cta" type="button">保存/シェア</button>
        </div>
      </section>
    </main>
    <script>
      // 日時を1分ごとに更新して、ホーム画面表示を実機風に合わせる。
      const weekDays = ["日", "月", "火", "水", "木", "金", "土"];
      const pad2 = (value) => String(value).padStart(2, "0");
      const syncClock = () => {
        const now = new Date();
        const hour = pad2(now.getHours());
        const minute = pad2(now.getMinutes());
        const month = pad2(now.getMonth() + 1);
        const day = pad2(now.getDate());
        document.getElementById("clock").textContent = `${hour}:${minute}`;
        document.getElementById("date").textContent =
          `${now.getFullYear()}/${month}/${day} (${weekDays[now.getDay()]})`;
      };
      syncClock();
      setInterval(syncClock, 60_000);
    </script>
  </body>
</html>
