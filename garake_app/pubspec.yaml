name: garake_app
description: "Garake style photo editor for iOS."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  image_picker: ^1.1.2
  camera: ^0.11.1
  image: ^4.5.4
  path_provider: ^2.1.5
  share_plus: ^11.1.0
  image_gallery_saver: ^2.0.3
  permission_handler: ^11.4.0
  intl: ^0.20.2
  google_mlkit_face_detection: ^0.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/stickers/
    - assets/frame/
